<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Maker</title>
    <!-- External stylesheet for cleaner structure -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="main-title">Decision Maker</h1>

    
    <div class="mode-container">
        <div class="controls">
            <label class="radio-label">
                <input type="radio" name="options" value="2" checked> 2 Options (Yes/No)
            </label>
            <label class="radio-label">
                <input type="radio" name="options" value="3"> 3 Options (Yes/No/Maybe)
            </label>
        </div>
        
        <div class="controls">
            <label class="radio-label">
                <input type="radio" name="mode" value="1" checked onchange="resetBestOf3()"> Single Spin
            </label>
            <label class="radio-label">
                <input type="radio" name="mode" value="3" onchange="resetBestOf3()"> Best of 3
            </label>
        </div>

        <div class="controls theme-picker">
            <span class="theme-label">Theme:</span>
            <button class="color-circle active" style="background-color: #000000;" onclick="changeBgColor('#000000', this)" title="AMOLED Dark"></button>
            <button class="color-circle" style="background-color: #1a1b26;" onclick="changeBgColor('#1a1b26', this)" title="Midnight Blue"></button>
            <button class="color-circle" style="background-color: #2e3440;" onclick="changeBgColor('#2e3440', this)" title="Nord"></button>
            <button class="color-circle" style="background-color: #0f172a;" onclick="changeBgColor('#0f172a', this)" title="Slate"></button>
            <button class="color-circle" style="background-color: #2c1010;" onclick="changeBgColor('#2c1010', this)" title="Deep Crimson"></button>
        </div>

        <div class="controls">
            <label class="radio-label">
                <input type="checkbox" id="soundToggle" onchange="toggleSound()"> 🔊 Sound
            </label>
        </div>
    </div>

    <div class="layout-container">
        <div class="slot-machine">
            <!-- Chasing Casino Lights -->
            <div class="lights-container top"></div>
            <div class="lights-container bottom"></div>
            <div class="lights-container left"></div>
            <div class="lights-container right"></div>

            <div class="slot-window">
                <div id="result">PULL!</div>
            </div>
            
            <div class="lever-container" id="lever" onclick="spinToDecide()">
                <div class="lever-base"></div>
                <div class="lever-stick-wrapper">
                    <div class="lever-stick">
                        <div class="lever-knob"></div>
                    </div>
                </div>
            </div>
            
            <div class="pull-text">PULL LEVER</div>
            <div class="spin-counter" id="spinCounter">Spin 0 / 3</div>
        </div>

        <div class="history-panel">
            <h3 class="history-title">History</h3>
            <ul class="history-list" id="historyList">
                <!-- History items populate here dynamically -->
            </ul>
            <button class="btn-clear" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <!-- External script with logic and randomness -->
    <script src="script.js"></script>
</body>
</html>
